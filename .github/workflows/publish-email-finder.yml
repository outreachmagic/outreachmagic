name: Publish email-finder

on:
  push:
    branches:
      - main
    tags:
      - "email-finder-v*"

concurrency:
  group: publish-email-finder-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests and SkillScan
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python3 -m pip install -q pytest

      - name: Verify companion_common sync
        run: bash scripts/sync-companion-common.sh --check

      - name: Run email-finder tests
        run: python3 tests/test_email_finder.py && python3 tests/test_companion_common_sync.py

      - name: HermesHub SkillScan (strict)
        run: bash scripts/skill-scan.sh --strict email-finder

  publish:
    name: Publish outreachmagic/email-finder
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble skill repo
        run: |
          python3 scripts/generate_skill_manifest.py email-finder
          mkdir -p staging/scripts staging/references
          cp skills/email-finder/SKILL.md staging/
          cp skills/email-finder/README.md staging/
          cp skills/email-finder/SECURITY.md staging/
          cp skills/email-finder/config.example.json staging/
          cp skills/email-finder/default.env staging/
          cp skills/email-finder/.gitignore staging/
          cp skills/email-finder/update-manifest.json staging/
          cp skills/email-finder/references/email-finding-research.md staging/references/
          cp skills/email-finder/scripts/*.py staging/scripts/
          cp LICENSE staging/

      - name: Push to outreachmagic/email-finder
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd staging
          git init -b main
          git config user.name "Outreach Magic Team"
          git config user.email "bot@outreachmagic.io"
          git add -A
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME#email-finder-}"
            git commit -m "Release ${TAG}"
            git tag "${TAG}"
          else
            MSG="${{ github.event.head_commit.message }}"
            if [[ -z "$MSG" ]]; then
              MSG="Sync from monorepo (${{ github.sha }})"
            fi
            git commit -m "$MSG"
          fi
          git remote add origin "https://x-access-token:${PUBLISH_TOKEN}@github.com/outreachmagic/email-finder.git"
          git push origin main --force
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            git push origin "${TAG}" --force
          fi

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME#email-finder-}"
          gh release create "${TAG}" \
            --repo "outreachmagic/email-finder" \
            --title "${TAG}" \
            --notes "Email Finder release ${TAG}" \
            --latest 2>/dev/null || echo "Release already exists or repo not created yet"
