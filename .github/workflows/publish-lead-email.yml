name: Publish lead-email

on:
  push:
    tags:
      - "lead-email-v*"

concurrency:
  group: publish-lead-email-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests and SkillScan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run lead-email tests
        run: python3 tests/test_lead_email.py

      - name: HermesHub SkillScan (strict)
        run: bash scripts/skill-scan.sh --strict lead-email

  publish:
    name: Publish outreachmagic/lead-email
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble skill repo
        run: |
          python3 scripts/generate-lead-email-manifest.py
          mkdir -p staging/scripts staging/references
          cp skills/lead-email/SKILL.md staging/
          cp skills/lead-email/README.md staging/
          cp skills/lead-email/SECURITY.md staging/
          cp skills/lead-email/config.example.json staging/
          cp skills/lead-email/default.env staging/
          cp skills/lead-email/.gitignore staging/
          cp skills/lead-email/update-manifest.json staging/
          cp skills/lead-email/references/email-finding-research.md staging/references/
          cp skills/lead-email/scripts/lead_email.py staging/scripts/
          cp skills/lead-email/scripts/companion_common.py staging/scripts/
          cp LICENSE staging/

      - name: Push to outreachmagic/lead-email
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME#lead-email-}"
          cd staging
          git init -b main
          git config user.name "OutreachMagic Bot"
          git config user.email "bot@outreachmagic.io"
          git add -A
          git commit -m "Release ${TAG}"
          git tag "${TAG}"
          git remote add origin "https://x-access-token:${PUBLISH_TOKEN}@github.com/outreachmagic/lead-email.git"
          git push origin main --force
          git push origin "${TAG}" --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME#lead-email-}"
          gh release create "${TAG}" \
            --repo "outreachmagic/lead-email" \
            --title "${TAG}" \
            --notes "Lead Email release ${TAG}" \
            --latest 2>/dev/null || echo "Release already exists or repo not created yet"
