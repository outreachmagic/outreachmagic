name: Publish lead-enrich

on:
  push:
    branches:
      - main
    tags:
      - "lead-enrich-v*"

concurrency:
  group: publish-lead-enrich-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests and SkillScan
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python3 -m pip install -q pytest

      - name: Verify companion_common sync
        run: bash scripts/sync-companion-common.sh --check

      - name: Run lead-enrich tests
        run: python3 tests/test_lead_enrich.py && python3 tests/test_companion_common_sync.py

      - name: HermesHub SkillScan (strict)
        run: bash scripts/skill-scan.sh --strict lead-enrich

  publish:
    name: Publish outreachmagic/lead-enrich
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble skill repo
        run: |
          python3 scripts/generate_skill_manifest.py lead-enrich
          mkdir -p staging/scripts staging/references
          cp skills/lead-enrich/SKILL.md staging/
          cp skills/lead-enrich/README.md staging/
          cp skills/lead-enrich/SECURITY.md staging/
          cp skills/lead-enrich/config.example.json staging/
          cp skills/lead-enrich/default.env staging/
          cp skills/lead-enrich/.gitignore staging/
          cp skills/lead-enrich/update-manifest.json staging/
          cp skills/lead-enrich/references/email-finder.md staging/references/
          cp skills/lead-enrich/scripts/enrich.py staging/scripts/
          cp skills/lead-enrich/scripts/companion_common.py staging/scripts/
          cp LICENSE staging/

      - name: Push to outreachmagic/lead-enrich
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd staging
          git init -b main
          git config user.name "Outreach Magic Bot"
          git config user.email "bot@outreachmagic.io"
          git add -A
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME#lead-enrich-}"
            git commit -m "Release ${TAG}"
            git tag "${TAG}"
          else
            git commit -m "Update to ${{ github.sha }}"
          fi
          git remote add origin "https://x-access-token:${PUBLISH_TOKEN}@github.com/outreachmagic/lead-enrich.git"
          git push origin main --force
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            git push origin "${TAG}" --force
          fi

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME#lead-enrich-}"
          gh release create "${TAG}" \
            --repo "outreachmagic/lead-enrich" \
            --title "${TAG}" \
            --notes "Lead Enrich release ${TAG}" \
            --latest 2>/dev/null || echo "Release already exists or repo not created yet"
