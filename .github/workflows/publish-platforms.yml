name: Publish Platform Repos

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-platforms-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: hermes-outreachmagic
            org: outreachmagic
            skill_md: platforms/hermes/SKILL.md
            readme: platforms/hermes/README.md
            extras: "platforms/hermes/install.sh"
            github_repo_value: outreachmagic/hermes-outreachmagic
          - platform: cursor-outreachmagic
            org: outreachmagic
            skill_md: platforms/cursor/SKILL.md
            readme: platforms/cursor/README.md
            extras: "platforms/cursor/outreachmagic.mdc platforms/cursor/install.sh"
            github_repo_value: outreachmagic/cursor-outreachmagic
          - platform: claude-code-outreachmagic
            org: outreachmagic
            skill_md: platforms/claude-code/SKILL.md
            readme: platforms/claude-code/README.md
            extras: "platforms/claude-code/CLAUDE_SNIPPET.md platforms/claude-code/install.sh"
            github_repo_value: outreachmagic/claude-code-outreachmagic
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble platform repo
        run: |
          mkdir -p staging/scripts staging/references

          # Copy shared scripts and references
          cp skills/outreachmagic/scripts/*.py staging/scripts/
          cp skills/outreachmagic/scripts/VERSION staging/scripts/
          cp -r skills/outreachmagic/references/* staging/references/
          cp skills/outreachmagic/update-manifest.json staging/ 2>/dev/null || true

          # Copy platform-specific SKILL.md (if applicable)
          if [ -n "${{ matrix.skill_md }}" ]; then
            cp "${{ matrix.skill_md }}" staging/SKILL.md
          fi

          # Copy README
          cp "${{ matrix.readme }}" staging/README.md

          # Copy extras (mdc file, CLAUDE_SNIPPET, install.sh, etc.)
          if [ -n "${{ matrix.extras }}" ]; then
            for f in ${{ matrix.extras }}; do
              cp "$f" staging/
            done
          fi
          if [ -f staging/install.sh ]; then
            chmod +x staging/install.sh
          fi

          # Copy root-level files
          cp LICENSE staging/
          cp SECURITY.md staging/

          # Rewrite GITHUB_REPO and SKILL_REPO_PATH for platform-specific updates
          sed -i 's|GITHUB_REPO = "outreachmagic/outreachmagic-skill"|GITHUB_REPO = "${{ matrix.github_repo_value }}"|' staging/scripts/pipeline.py
          sed -i 's|GITHUB_REPO = "outreachmagic/hermes-agent"|GITHUB_REPO = "${{ matrix.github_repo_value }}"|' staging/scripts/pipeline.py
          sed -i 's|SKILL_REPO_PATH = "skills/outreachmagic"|SKILL_REPO_PATH = "."|' staging/scripts/pipeline.py

          # Regenerate update-manifest.json with correct checksums (post-rewrite)
          python3 -c "
          import hashlib, json, pathlib
          files = {}
          for name in ('pipeline.py', 'relay_extractors.py', 'workspace_routing.py', 'workspace_archive.py', 'routing_cloud.py', 'connections_cloud.py', 'db_health.py', 'om_paths.py', 'VERSION'):
              p = pathlib.Path('staging/scripts') / name
              if p.exists():
                  files[name] = hashlib.sha256(p.read_bytes()).hexdigest()
          skill_md = pathlib.Path('staging/SKILL.md')
          if skill_md.exists():
              files['SKILL.md'] = hashlib.sha256(skill_md.read_bytes()).hexdigest()
          version = (pathlib.Path('staging/scripts/VERSION').read_text().strip() if pathlib.Path('staging/scripts/VERSION').exists() else '0.0.0')
          manifest = {'version': version, 'files': files}
          pathlib.Path('staging/update-manifest.json').write_text(json.dumps(manifest, indent=2))
          "

      - name: Push to platform repo
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd staging
          git init -b main
          git config user.name "OutreachMagic Bot"
          git config user.email "bot@outreachmagic.io"
          git add -A
          git commit -m "Release ${{ github.ref_name }}"
          git tag "${{ github.ref_name }}"
          git remote add origin "https://x-access-token:${PUBLISH_TOKEN}@github.com/${{ matrix.org }}/${{ matrix.platform }}.git"
          git push origin main --force
          git push origin "${{ github.ref_name }}" --force

      - name: Create GitHub Release on platform repo
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ matrix.org }}/${{ matrix.platform }}" \
            --title "${{ github.ref_name }}" \
            --notes "Outreach Magic release ${{ github.ref_name }}" \
            --latest 2>/dev/null || \
          echo "Release already exists or could not be created"
