name: Publish outreachmagic

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-outreachmagic-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to outreachmagic/outreachmagic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble public release tree
        run: |
          set -euo pipefail
          STAGING=staging
          rm -rf "$STAGING"
          mkdir -p "$STAGING/skills/outreachmagic" "$STAGING/platforms/common" "$STAGING/platforms/overlays/cursor" "$STAGING/platforms/overlays/claude"

          cp -r skills/outreachmagic/scripts "$STAGING/skills/outreachmagic/"
          cp -r skills/outreachmagic/references "$STAGING/skills/outreachmagic/"

          cp install.sh "$STAGING/"
          chmod +x "$STAGING/install.sh"
          cp platforms/common/install-companions.sh "$STAGING/platforms/common/"
          chmod +x "$STAGING/platforms/common/install-companions.sh"
          cp platforms/overlays/cursor/outreachmagic.mdc "$STAGING/platforms/overlays/cursor/"
          cp platforms/overlays/claude/CLAUDE_SNIPPET.md "$STAGING/platforms/overlays/claude/"

          cp LICENSE "$STAGING/"
          cp SECURITY.md "$STAGING/"
          cp platforms/outreachmagic-README.md "$STAGING/README.md"

          python3 -c "
          import sys
          sys.path.insert(0, 'skills/outreachmagic/scripts')
          import pipeline as om
          om.sync_skill_md_version()
          "
          python3 scripts/generate-update-manifest.py
          cp skills/outreachmagic/SKILL.md "$STAGING/skills/outreachmagic/"
          cp skills/outreachmagic/update-manifest.json "$STAGING/skills/outreachmagic/"

      - name: Push to public repo
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          cd staging
          git init -b main
          git config user.name "Outreach Magic Bot"
          git config user.email "bot@outreachmagic.io"
          git add -A
          git commit -m "Release ${{ github.ref_name }}"
          git tag "${{ github.ref_name }}"
          git remote add origin "https://x-access-token:${PUBLISH_TOKEN}@github.com/outreachmagic/outreachmagic.git"
          git push origin main --force
          git push origin "${{ github.ref_name }}" --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "outreachmagic/outreachmagic" \
            --title "${{ github.ref_name }}" \
            --notes "Outreach Magic release ${{ github.ref_name }}" \
            --latest 2>/dev/null || \
          echo "Release already exists or could not be created"
