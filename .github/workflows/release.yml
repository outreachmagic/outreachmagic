name: Release Skill

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-skill-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python3 -m pip install -q pytest

      - name: Verify tag, manifest, tests, and SkillScan
        run: |
          bash scripts/verify-release-tag.sh "${{ github.ref_name }}"
          bash scripts/run-tests.sh
          bash scripts/skill-scan.sh --strict

  publish:
    name: Publish GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release tarball
        run: bash scripts/build-release.sh "${{ github.ref_name }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/outreachmagic-skill-*.tar.gz
            dist/outreachmagic-skill-*.tar.gz.sha256
            dist/update-manifest.json
