name: Skill CI

on:
  pull_request:
    paths:
      - "skills/**"
      - "scripts/**"
      - ".github/workflows/skill-scan.yml"
      - "SECURITY.md"
      - "LICENSE"
  push:
    branches: [main]

concurrency:
  group: skill-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python3 -m pip install -q pytest

      - name: Run test suite
        run: bash scripts/run-tests.sh

      - name: Run lead-enrich tests
        run: python3 tests/test_lead_enrich.py

      - name: Run email-finder tests
        run: python3 tests/test_email_finder.py

  manifest:
    name: Update manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify companion_common sync
        run: bash scripts/sync-companion-common.sh --check

      - name: Verify skill manifests and install contract
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'skills/outreachmagic/scripts')
          import pipeline as om
          om.sync_skill_md_version()
          "
          python3 scripts/generate_skill_manifest.py --all
          git diff --exit-code \
            skills/outreachmagic/update-manifest.json \
            skills/lead-enrich/update-manifest.json \
            skills/email-finder/update-manifest.json
          python3 scripts/validate-companion-manifests.py
          python3 scripts/dark-factory/validate-om-manifest.py

  skill-scan:
    name: SkillScan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: HermesHub SkillScan (strict)
        run: bash scripts/skill-scan.sh --strict
